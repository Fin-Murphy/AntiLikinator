<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #262626;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
      }
      .label {
        font-size: 13px;
        line-height: 1.3;
        padding-right: 10px;
      }
      /* toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 42px;
        height: 24px;
        flex: 0 0 auto;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #ccc;
        border-radius: 24px;
        transition: 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider {
        background: #0095f6;
      }
      input:checked + .slider::before {
        transform: translateX(18px);
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #8e8e8e;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>AntiLikinator</h1>
      <div class="row">
        <span class="label">Hide posts I've already liked</span>
        <label class="switch">
          <input type="checkbox" id="toggle" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">
        Only affects the Following feed. Posts you've already liked are hidden
        the next time the feed loads.
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
